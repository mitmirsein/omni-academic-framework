name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Sync dev dependencies
        # scholar-browser: Scholar 파서 snapshot 테스트가 실 게이트로 돌도록
        run: uv sync --extra dev --extra scholar-browser

      - name: Ruff (lint gate — real-bug signals only)
        run: uv run ruff check src tests

      - name: Pytest (offline suite)
        run: uv run python -m pytest -q

      - name: Byte-compile
        run: uv run python -m compileall -q src tests
